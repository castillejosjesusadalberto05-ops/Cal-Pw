<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calculadora API</title>
  <style>
    body {
      font-family: 'Trebuchet MS', Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      background-color: #fef9ef;  /* crema claro */
    }
    .tarjeta {
      background-color: #ffffff;
      border: 1px solid #c5a880;  /* marrón claro */
      border-radius: 10px;
      padding: 30px;
      width: 360px;
      box-shadow: 0 4px 8px rgba(139, 109, 69, 0.1);
    }
    h2 {
      color: #6b4c3a;  /* marrón oscuro */
      margin-top: 0;
      text-align: center;
      border-bottom: 2px solid #8b9a6e;  /* verde oliva */
      padding-bottom: 10px;
    }
    label {
      font-weight: 600;
      color: #5a4a3a;
      display: block;
      margin-top: 15px;
    }
    input, select {
      width: 100%;
      padding: 10px;
      margin-top: 5px;
      border: 1px solid #c5a880;
      border-radius: 6px;
      background-color: #fdfaf6;
      box-sizing: border-box;
    }
    button {
      width: 100%;
      padding: 12px;
      margin-top: 20px;
      background-color: #8b9a6e;  /* verde oliva */
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 16px;
      font-weight: bold;
      letter-spacing: 0.5px;
      transition: background-color 0.2s;
    }
    button:hover {
      background-color: #6f7d57;
    }
    .error-box {
      color: #b84c3b;  /* rojo terroso */
      font-weight: bold;
      margin-top: 15px;
      padding: 10px;
      background-color: #fdecea;
      border: 1px solid #e0a899;
      border-radius: 6px;
    }
    .resultado-box {
      color: #4f6d3a;  /* verde oscuro */
      font-weight: bold;
      margin-top: 15px;
      font-size: 1.2em;
      text-align: center;
      padding: 10px;
      background-color: #edf3e8;
      border: 1px solid #b8cf9c;
      border-radius: 6px;
    }
  </style>

  <div id="app"></div>
</body>
